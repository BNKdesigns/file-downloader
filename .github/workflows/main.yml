name: Download Large File + Split + Index

on:
  workflow_dispatch:
    inputs:
      URL:
        description: "File URL to download"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip jq

      - name: Prepare folders
        run: |
          mkdir -p downloads
          mkdir -p site

      - name: Download file
        id: download
        run: |
          cd downloads

          FILE=$(basename "${URL}")
          curl -L "${URL}" -o "$FILE"

          SIZE=$(stat -c%s "$FILE")
          HASH=$(sha256sum "$FILE" | cut -d ' ' -f1)

          echo "filename=$FILE" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT
          echo "sha256=$HASH" >> $GITHUB_OUTPUT
        env:
          URL: ${{ inputs.URL }}

      - name: Split if large
        id: split
        run: |
          cd downloads

          FILE="${{ steps.download.outputs.filename }}"
          SIZE="${{ steps.download.outputs.size }}"

          LIMIT=$((99 * 1024 * 1024))

          if [ "$SIZE" -lt "$LIMIT" ]; then
            PARTS_JSON=$(printf '["%s"]' "$FILE")
            PARTS_B64=$(echo "$PARTS_JSON" | base64 -w 0)
            echo "parts_b64=$PARTS_B64" >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE="${FILE%.*}"

          zip -s 99m "${BASE}.zip" "$FILE"
          rm "$FILE"

          PARTS_JSON=$(ls ${BASE}.z* ${BASE}.zip | jq -R . | jq -s .)
          PARTS_B64=$(echo "$PARTS_JSON" | base64 -w 0)

          echo "parts_b64=$PARTS_B64" >> $GITHUB_OUTPUT


      - name: Generate JSON index
        run: |
          mkdir -p site

          PARTS_JSON=$(echo "${{ steps.split.outputs.parts_b64 }}" | base64 --decode)

          cat <<EOF > site/files.json
          [
            {
              "name": "${{ steps.download.outputs.filename }}",
              "size": "${{ steps.download.outputs.size }}",
              "sha256": "${{ steps.download.outputs.sha256 }}",
              "parts": $PARTS_JSON
            }
          ]
          EOF


      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add downloads site
          git commit -m "Add downloaded file + index from URL: ${{ inputs.URL }}" || echo "no changes"
          git push
