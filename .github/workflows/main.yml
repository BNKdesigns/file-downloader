name: Download Latest Release Asset

on:
  workflow_dispatch:

env:
  REPO: "2dust/v2rayN"
  DOWNLOAD_TARGET: "v2rayN-windows-64.zip"   # ← change only this

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest release tag
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ env.REPO }}/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download asset
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ env.REPO }}
          tag: ${{ steps.latest.outputs.tag }}
          fileName: ${{ env.DOWNLOAD_TARGET }}
          out-file-path: ./downloads
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload downloaded file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-release-${{ steps.latest.outputs.tag }}
          path: ./downloads/*
