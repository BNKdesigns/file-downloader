name: Download Latest Release Asset

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO: "2dust/v2rayN"
  DOWNLOAD_TARGET: "v2rayN-windows-64.zip"   # ← change only this

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release tag
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ env.REPO }}/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download asset
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ env.REPO }}
          tag: ${{ steps.latest.outputs.tag }}
          fileName: ${{ env.DOWNLOAD_TARGET }}
          out-file-path: ./downloads
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add downloads/*
          git commit -m "Add latest release: ${{ env.DOWNLOAD_TARGET }}" || echo "No changes"
          git push
