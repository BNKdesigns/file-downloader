name: Download and Split Large File (WinRAR-style)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # ← CHANGE ONLY THIS
  DOWNLOAD_URL: "https://release-assets.githubusercontent.com/github-production-release-asset/608163800/b52f1196-6021-4d9f-9ead-06a4bf341db6?sp=r&sv=2018-11-09&sr=b&spr=https&se=2026-04-28T06%3A40%3A24Z&rscd=attachment%3B+filename%3Dget-cookies.txt-locally_v0.7.2_firefox.zip&rsct=application%2Foctet-stream&skoid=96c2d410-5711-43a1-aedd-ab1947aa7ab0&sktid=398a6654-997b-47e9-b12b-9515b896b4de&skt=2026-04-28T05%3A40%3A15Z&ske=2026-04-28T06%3A40%3A24Z&sks=b&skv=2018-11-09&sig=oLn8xlub7a23HmqZoCBTXfNGfDdQQs%2F0eup7IcLzvyo%3D&jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJnaXRodWIuY29tIiwiYXVkIjoicmVsZWFzZS1hc3NldHMuZ2l0aHVidXNlcmNvbnRlbnQuY29tIiwia2V5Ijoia2V5MSIsImV4cCI6MTc3NzM1NTMyMiwibmJmIjoxNzc3MzU1MDIyLCJwYXRoIjoicmVsZWFzZWFzc2V0cHJvZHVjdGlvbi5ibG9iLmNvcmUud2luZG93cy5uZXQifQ.rFcVVhNXo3_N0vykJXOVY36--RQPC4rfiwFNsw_eD_A&response-content-disposition=attachment%3B%20filename%3Dget-cookies.txt-locally_v0.7.2_firefox.zip&response-content-type=application%2Foctet-stream"

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install zip (supports multi-part archives)
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download file from URL
        id: dl
        run: |
          cd downloads

          FILENAME=$(basename "${DOWNLOAD_URL}")
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT

          echo "Downloading ${DOWNLOAD_URL}"
          curl -L "${DOWNLOAD_URL}" -o "${FILENAME}"

          SIZE_BYTES=$(stat -c%s "${FILENAME}")
          echo "size_bytes=${SIZE_BYTES}" >> $GITHUB_OUTPUT

          echo "Downloaded file size: ${SIZE_BYTES} bytes"

        env:
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}

      - name: Split only if ≥ 99MB using multi-part ZIP (WinRAR-style)
        id: split
        run: |
          cd downloads

          FILENAME="${{ steps.dl.outputs.filename }}"
          SIZE_BYTES="${{ steps.dl.outputs.size_bytes }}"

          LIMIT=$((99 * 1024 * 1024)) # 99MB

          if [ "$SIZE_BYTES" -lt "$LIMIT" ]; then
            echo "File < 99MB, no splitting required."
            echo "output_pattern=${FILENAME}" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "File >= 99MB, creating multi-part ZIP archive..."

          BASENAME="${FILENAME%.*}"
          EXT="${FILENAME##*.}"

          # Multi-part zip output will be:
          #   BASENAME.zip (last part)
          #   BASENAME.z01 (first)
          #   BASENAME.z02 ...
          #
          # 99m = 99 megabytes per file
          zip -s 99m "${BASENAME}.zip" "${FILENAME}"

          echo "Multi-part zip archive created:"
          ls -lh "${BASENAME}".z* "${BASENAME}.zip"

          # Remove original large file
          rm "${FILENAME}"

          echo "output_pattern=${BASENAME}" >> $GITHUB_OUTPUT

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "Files in downloads directory:"
          ls -lh downloads

          git add downloads/*
          git commit -m "Add downloaded file (auto-split if needed) from ${DOWNLOAD_URL}" || echo "No changes to commit"
          git push
        env:
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}
