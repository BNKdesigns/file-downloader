name: Download and Split Large File

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # ← CHANGE ONLY THIS
  DOWNLOAD_URL: "https://github.com/2dust/v2rayN/releases/download/7.20.4/v2rayN-windows-64.zip"

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create downloads directory
        run: mkdir -p downloads

      - name: Download file from URL
        id: download
        run: |
          cd downloads
          # Get base filename from URL
          FILENAME=$(basename "${DOWNLOAD_URL}")
          echo "filename=${FILENAME}" >> $GITHUB_OUTPUT

          echo "Downloading: ${DOWNLOAD_URL}"
          curl -L "${DOWNLOAD_URL}" -o "${FILENAME}"

          # Get size in bytes
          SIZE_BYTES=$(stat -c%s "${FILENAME}")
          echo "size_bytes=${SIZE_BYTES}" >> $GITHUB_OUTPUT
          echo "Downloaded file size: ${SIZE_BYTES} bytes"

        env:
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}

      - name: Split file if >= 99 MB
        id: split
        run: |
          cd downloads

          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES=${{ steps.download.outputs.size_bytes }}

          # 99 MB in bytes
          LIMIT=$((99 * 1024 * 1024))

          if [ "$SIZE_BYTES" -lt "$LIMIT" ]; then
            echo "File is smaller than 99MB, no split required."
            echo "part1=${FILENAME}" >> $GITHUB_OUTPUT
            echo "part2=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "File is >= 99MB, splitting into two parts..."

          # Compute half size (ceil division)
          HALF=$(( (SIZE_BYTES + 1) / 2 ))

          PART1="${FILENAME}.part1"
          PART2="${FILENAME}.part2"

          # Use split to create exactly two parts
          # First half bytes, then the rest
          head -c "$HALF" "$FILENAME" > "$PART1"
          tail -c +$((HALF + 1)) "$FILENAME" > "$PART2"

          # Optional: remove original big file to avoid accidentally adding it
          rm "$FILENAME"

          echo "Created parts:"
          ls -lh "$PART1" "$PART2"

          echo "part1=${PART1}" >> $GITHUB_OUTPUT
          echo "part2=${PART2}" >> $GITHUB_OUTPUT

      - name: Git add, commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "Current downloads directory:"
          ls -lh downloads

          # Add everything in downloads (either one file or two parts)
          git add downloads/*

          git status

          git commit -m "Add downloaded file (split if needed) from ${DOWNLOAD_URL}" || echo "No changes to commit"
          git push
        env:
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}
